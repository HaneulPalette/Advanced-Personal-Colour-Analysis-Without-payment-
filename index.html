<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Personal Colour Analysis</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>Advanced Personal Colour Analysis</h1>

    <div class="section">
        <label>Select Your Photo</label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>

    <div class="section hidden" id="previewSection">
        <h2>✨ Preview Result</h2>
        <div id="previewOutput"></div>
    </div>

    <button id="analyzeBtn" disabled>Generate Full Report (PDF)</button>

    <div id="result"></div>

</div>

<!-- ✅ LOAD jsPDF FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- ✅ THEN YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
