<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Personal Colour Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>Advanced Personal Colour Analysis (Free Preview)</h1>

    <!-- Upload -->
    <div class="section">
        <label>Select Your Photo</label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>

    <!-- Preview -->
    <div class="section hidden" id="previewSection">
        <h2>✨ Preview Result</h2>
        <div id="previewOutput"></div>
        <p><b>Click below to generate full report 👇</b></p>
    </div>

    <button id="analyzeBtn" disabled>Generate Full Report</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
